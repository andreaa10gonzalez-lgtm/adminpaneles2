async function deploy() {
  document.getElementById('status').textContent = 'Getting current SHA...';
  
  // Get current SHA
  const r1 = await fetch(EDGE_URL);
  const d1 = await r1.json();
  document.getElementById('status').textContent = 'SHA: ' + d1.sha + ' | Uploading ' + B64.length + ' chars...';
  
  // Upload
  const r2 = await fetch(EDGE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content_b64: B64, sha: d1.sha })
  });
  const d2 = await r2.json();
  document.getElementById('status').textContent = 'DONE! ' + JSON.stringify(d2);
}

deploy().catch(e => document.getElementById('status').textContent = 'ERROR: ' + e.message);
